<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.35, maximum-scale=8, user-scalable=yes, viewport-fit=cover">
<title>神州降神試算、掉落查詢系統｜免驗證版</title>
<style>
:root{--bg:#08101d;--panel:#0d1526;--line:#2b3a55;--text:#eaf2ff;--muted:#9fb2d1;--accent:#2dd4bf;--danger:#fb7185;--safe-bottom:max(8px, env(safe-area-inset-bottom))}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#08101d;color:var(--text);font-family:"Microsoft JhengHei UI","Microsoft JhengHei",system-ui,sans-serif;overflow:auto}
.top{position:fixed;left:0;right:0;top:0;z-index:50;background:rgba(8,16,29,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px);padding:10px 12px}
.topline{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.title{font-size:18px;font-weight:900}.maker{font-size:12px;color:#fff;font-weight:800}
.badge{font-size:12px;color:#c9f8ff;border:1px solid var(--line);background:#0e1728;border-radius:999px;padding:6px 10px}
.category-hint{max-width:1280px;margin:8px auto 4px;font-size:12px;color:#9fb2d1;font-weight:900}.switch{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.switch button{border:2px solid #334155;background:#0d1526;color:#dbe7ff;border-radius:16px;padding:14px 10px;font-weight:1000;cursor:pointer;font:inherit;font-size:16px;box-shadow:0 8px 22px rgba(0,0,0,.2)}
.switch button.active{background:linear-gradient(135deg,#2dd4bf,#60a5fa);border-color:#7dd3fc;color:#04111f;box-shadow:0 0 0 3px rgba(96,165,250,.18),0 12px 28px rgba(45,212,191,.22)}
.frame-wrap{position:fixed;left:0;right:0;bottom:0;top:128px}
.tool-frame{width:100%;height:100%;border:0;display:none;background:#08101d}.tool-frame.active{display:block}
.modal-backdrop{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.76);display:none;align-items:center;justify-content:center;padding:14px}
.modal{width:min(700px,100%);background:#111827;border:1px solid #475569;border-radius:18px;padding:18px;box-shadow:0 25px 90px rgba(0,0,0,.55)}
textarea{width:100%;min-height:120px;border:1px solid #3a4a68;background:#0c1424;color:var(--text);border-radius:12px;padding:11px 12px;outline:none;font:inherit}
.error{color:var(--danger);font-weight:900;margin-top:8px}
.primary{border:0;border-radius:12px;background:var(--accent);color:#062a24;padding:10px 14px;font-weight:900;cursor:pointer;margin-top:10px;font:inherit}
@media(max-width:700px){.title{font-size:16px}.top{padding:8px 10px}.frame-wrap{top:132px}.switch button{font-size:13px;padding:9px 5px}}

/* ===== v8 mobile landscape compact header ===== */
@media (orientation: landscape), (max-height:900px){
  .top{
    padding:3px 8px!important;
  }
  .topline{
    display:grid!important;
    grid-template-columns:1fr auto!important;
    gap:4px!important;
    align-items:center!important;
  }
  .title{
    font-size:13px!important;
    line-height:1.1!important;
    white-space:nowrap!important;
    overflow:hidden!important;
    text-overflow:ellipsis!important;
  }
  .maker{display:none!important}
  .badge{
    font-size:10px!important;
    padding:2px 7px!important;
  }
  .category-hint{display:none!important}
  .switch{
    margin:3px auto 0!important;
    gap:5px!important;
  }
  .switch button{
    padding:6px 5px!important;
    font-size:13px!important;
    border-radius:10px!important;
    border-width:1px!important;
    box-shadow:none!important;
  }
  .frame-wrap{
    top:54px!important;
  }
}
@media (max-width:700px){
  .top{
    padding:4px 8px!important;
  }
  .title{font-size:14px!important}
  .switch{gap:6px!important}
  .switch button{padding:8px 6px!important;font-size:14px!important}
  .frame-wrap{top:76px!important}
}
@media (max-width:700px) and (orientation: landscape), (max-width:950px) and (max-height:520px){
  .top{padding:2px 6px!important}
  .title{font-size:12px!important}
  .badge{display:none!important}
  .switch button{padding:5px 4px!important;font-size:12px!important}
  .frame-wrap{top:46px!important}
}


/* ===== v9 mobile landscape ultra compact header ===== */
html,body,.tool-frame{touch-action:pan-x pan-y pinch-zoom!important}
.tool-frame{overscroll-behavior:auto!important}

@media (orientation: landscape), (max-height:560px){
  .top{
    height:34px!important;
    min-height:34px!important;
    max-height:34px!important;
    overflow:hidden!important;
    padding:3px 6px!important;
  }
  .topline{
    display:none!important;
  }
  .category-hint{
    display:none!important;
  }
  .switch{
    margin:0!important;
    max-width:none!important;
    height:28px!important;
    gap:5px!important;
    grid-template-columns:1fr 1fr!important;
  }
  .switch button{
    min-height:0!important;
    height:28px!important;
    padding:2px 6px!important;
    font-size:13px!important;
    line-height:1!important;
    border-radius:10px!important;
    border-width:1px!important;
    box-shadow:none!important;
  }
  .frame-wrap{
    top:34px!important;
  }
}

/* 直式手機保留標題，但壓縮一點 */
@media (max-width:700px) and (orientation: portrait){
  .top{padding:6px 8px!important}
  .title{font-size:15px!important;line-height:1.15!important}
  .maker{display:none!important}
  .badge{font-size:10px!important;padding:3px 8px!important}
  .category-hint{display:none!important}
  .switch{margin:5px auto 0!important;gap:6px!important}
  .switch button{padding:9px 6px!important;font-size:14px!important;border-radius:12px!important}
  .frame-wrap{top:84px!important}
}


/* ===== v16 desktop readability ===== */
@media (min-width:901px){
  .title{font-size:22px!important}
  .badge{font-size:14px!important}
  .maker{font-size:14px!important}
  .category-hint{font-size:14px!important}
  .switch button{font-size:18px!important;padding:16px 12px!important}
}


/* ===== v17 desktop spacing fix ===== */
@media (min-width:901px){
  .top{padding:10px 14px 12px!important}
  .switch{gap:10px!important}
  .switch button{font-size:17px!important;padding:13px 10px!important;line-height:1.2!important}
  .frame-wrap{top:142px!important}
}


/* ===== v18 desktop spacing readable ===== */
@media (min-width:901px){
  .top{padding:12px 16px 14px!important}
  .title{font-size:22px!important;line-height:1.25!important}
  .badge{font-size:14px!important}
  .maker{font-size:14px!important}
  .switch{margin:10px auto 0!important;gap:12px!important}
  .switch button{font-size:18px!important;padding:15px 12px!important;line-height:1.25!important}
  .frame-wrap{top:170px!important}
}
@media (min-width:901px) and (max-height:700px){
  .top{padding:8px 12px!important}
  .title{font-size:18px!important}
  .switch button{font-size:16px!important;padding:10px 8px!important}
  .frame-wrap{top:120px!important}
}


/* ===== v19 layout fix: header stays visible, no hidden top area ===== */
.top{
  position:sticky!important;
  top:0!important;
}
.frame-wrap{
  position:relative!important;
  left:auto!important;
  right:auto!important;
  bottom:auto!important;
  top:auto!important;
  height:calc(100vh - 132px)!important;
  min-height:620px!important;
}
@media (min-width:901px){
  .top{padding:10px 14px!important}
  .title{font-size:21px!important;line-height:1.25!important}
  .switch{margin:8px auto 0!important;gap:10px!important}
  .switch button{font-size:17px!important;padding:12px 10px!important;line-height:1.25!important}
  .frame-wrap{height:calc(100vh - 132px)!important;min-height:640px!important}
}
@media (max-width:700px){
  .frame-wrap{height:calc(100vh - 88px)!important;min-height:520px!important}
}
@media (orientation: landscape), (max-height:560px){
  .frame-wrap{height:calc(100vh - 42px)!important;min-height:360px!important}
}


/* ===== v20 final desktop/header de-overlap fix ===== */
@media (min-width:901px){
  .top{
    position:relative!important;
    left:auto!important;
    right:auto!important;
    top:auto!important;
    height:auto!important;
    min-height:0!important;
    max-height:none!important;
    overflow:visible!important;
    padding:12px 16px 14px!important;
  }
  .topline{
    display:flex!important;
    grid-template-columns:none!important;
    max-width:1280px!important;
    margin:0 auto!important;
    gap:10px!important;
    align-items:center!important;
    justify-content:space-between!important;
    flex-wrap:wrap!important;
  }
  .title{
    font-size:22px!important;
    line-height:1.25!important;
    white-space:normal!important;
    overflow:visible!important;
    text-overflow:clip!important;
  }
  .maker{display:block!important}
  .badge{display:inline-block!important}
  .category-hint{display:block!important}
  .switch{
    max-width:1280px!important;
    margin:8px auto 0!important;
    height:auto!important;
    gap:12px!important;
    grid-template-columns:1fr 1fr!important;
  }
  .switch button{
    height:auto!important;
    min-height:0!important;
    max-height:none!important;
    padding:14px 12px!important;
    font-size:18px!important;
    line-height:1.25!important;
    border-radius:16px!important;
    overflow:visible!important;
  }
  .frame-wrap{
    position:relative!important;
    left:auto!important;
    right:auto!important;
    top:auto!important;
    bottom:auto!important;
    height:calc(100vh - 150px)!important;
    min-height:760px!important;
    margin:0!important;
    overflow:visible!important;
  }
  .tool-frame{
    height:100%!important;
    min-height:760px!important;
  }
}
/* 手機仍保留壓縮，不影響電腦版 */
@media (max-width:900px){
  .top{position:sticky!important;top:0!important}
  .frame-wrap{position:relative!important;top:auto!important;height:calc(100vh - 86px)!important;min-height:520px!important}
}


/* ===== v21 outer final layout fix ===== */
@media (min-width:901px){
  body{overflow:auto!important}
  .top{
    position:relative!important;
    top:auto!important;
    left:auto!important;
    right:auto!important;
    z-index:10!important;
    padding:12px 16px!important;
    height:auto!important;
    min-height:0!important;
    max-height:none!important;
    overflow:visible!important;
  }
  .topline{display:flex!important;align-items:center!important;justify-content:space-between!important;flex-wrap:wrap!important}
  .category-hint{display:block!important;margin:8px auto 4px!important}
  .switch{display:grid!important;grid-template-columns:1fr 1fr!important;gap:12px!important;max-width:1280px!important;margin:0 auto!important;height:auto!important}
  .switch button{height:auto!important;min-height:0!important;padding:14px 12px!important;font-size:18px!important;line-height:1.25!important;overflow:visible!important}
  .frame-wrap{
    position:relative!important;
    top:auto!important;
    left:auto!important;
    right:auto!important;
    bottom:auto!important;
    height:calc(100vh - 150px)!important;
    min-height:780px!important;
    overflow:visible!important;
  }
  .tool-frame{height:100%!important;min-height:780px!important}
}


/* ===== v26 lightweight external-data hint ===== */
@media (min-width:901px){
  .frame-wrap{min-height:760px!important}
}

function b64ToUtf8(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function withBaseHref(html){
  const baseUrl = location.href.split('#')[0].split('?')[0];
  const baseTag = `<base href="${baseUrl}">`;
  if(/<base\s/i.test(html)) return html;
  if(/<head[^>]*>/i.test(html)) return html.replace(/<head[^>]*>/i, m => m + baseTag);
  return baseTag + html;
}
function initLicense(){document.getElementById('licenseStatus').textContent='免驗證版';document.getElementById('mainShell').style.display='block'}
let __gmLoaded=false;
function bootFrames(){
  document.getElementById('frameJ').srcdoc = withBaseHref(b64ToUtf8(JIANGSHEN_B64));
}
function ensureGMLoaded(){
  if(__gmLoaded)return;
  document.getElementById('frameG').srcdoc = withBaseHref(b64ToUtf8(GM_B64));
  __gmLoaded=true;
}
function showTool(which){
  if(which==='g')ensureGMLoaded();
  document.getElementById('frameJ').classList.toggle('active', which==='j');
  document.getElementById('frameG').classList.toggle('active', which==='g');
  document.getElementById('btnJ').classList.toggle('active', which==='j');
  document.getElementById('btnG').classList.toggle('active', which==='g');
}
window.addEventListener('DOMContentLoaded',()=>{bootFrames();initLicense();});
</script>
