<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>神州掉落物品查詢｜免驗證版</title><style>
:root{--bg:#0b1220;--panel:#121b2d;--line:#2b3a55;--text:#eaf2ff;--muted:#9fb2d1;--accent:#2dd4bf;--accent2:#60a5fa;--danger:#fb7185;--warn:#fbbf24;--safe-bottom:max(10px, env(safe-area-inset-bottom))}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:linear-gradient(180deg,#08101d,#0b1220 45%,#101827);color:var(--text);font-family:"Microsoft JhengHei UI","Microsoft JhengHei",system-ui,sans-serif}
body{min-height:100vh}.app{max-width:1180px;margin:0 auto;padding-bottom:90px}
.topbar{position:sticky;top:0;z-index:20;background:rgba(8,16,29,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-top))}
.title{font-size:20px;font-weight:900}.topline{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.creator{font-size:13px;color:#fff;font-weight:800}.badge{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border:1px solid var(--line);background:#0e1728;border-radius:999px;font-size:12px;color:#dbe7ff}.license{font-weight:900;color:#c9f8ff}
button{border:0;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer;font:inherit}button.primary{background:var(--accent);color:#062a24}button.info{background:var(--accent2);color:#082341}button.secondary{background:#334155;color:#f8fafc}button.danger{background:#ef4444;color:#fff}.small-btn{padding:7px 10px;font-size:12px;border:1px solid var(--line);background:#0f172a;color:#eaf2ff;border-radius:999px}
.container{padding:12px}.tab{display:none}.tab.active{display:block}.panel{background:linear-gradient(180deg,rgba(19,28,45,.95),rgba(13,20,34,.95));border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 10px 30px rgba(0,0,0,.28)}.panel h2{margin:0 0 10px;font-size:18px}.hint{font-size:12px;color:var(--muted);line-height:1.7}.warn{color:var(--warn);font-weight:900}.error{color:var(--danger);font-weight:900}
.grid{display:grid;gap:10px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid4{grid-template-columns:repeat(4,minmax(0,1fr))}
.field{background:rgba(11,18,32,.64);border:1px solid #24324c;border-radius:14px;padding:10px}label{display:block;font-size:12px;color:#bfd0ea;font-weight:900;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid #3a4a68;background:#0c1424;color:var(--text);border-radius:12px;padding:11px 12px;outline:none;font:inherit}input:focus,select:focus,textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(96,165,250,.15)}input[type=file]{padding:10px;background:#0e1728}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.list{display:grid;gap:8px}.row-card{background:#09111f;border:1px solid #23324a;border-radius:16px;padding:12px;cursor:pointer}.row-card:hover{border-color:var(--accent2)}.row-title{font-size:16px;font-weight:900}.row-sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}.detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.kv{background:#0e1728;border:1px solid #26364f;border-radius:13px;padding:9px}.kv .k{font-size:11px;color:var(--muted);font-weight:900}.kv .v{font-size:14px;font-weight:900;margin-top:4px;word-break:break-word}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#09111f}table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:9px 10px;border-bottom:1px solid #1e2a40;text-align:left;white-space:nowrap;font-size:14px}th{position:sticky;top:0;background:#172338;color:#ecf4ff}.pill{display:inline-block;background:#0e1728;border:1px solid #26364f;border-radius:999px;padding:4px 8px;margin:2px;font-size:12px}.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(8,16,29,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 10px calc(8px + var(--safe-bottom))}.nav-wrap{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav-btn{border:1px solid var(--line);background:#0d1526;color:#dbe7ff;border-radius:14px;padding:9px 6px;font-size:12px;line-height:1.35}.nav-btn.active{background:var(--accent);color:#062a24;border-color:var(--accent)}
.modal-backdrop{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.74);display:none;align-items:center;justify-content:center;padding:14px}.modal{width:min(700px,100%);background:#111827;border:1px solid #475569;border-radius:18px;padding:18px;box-shadow:0 25px 90px rgba(0,0,0,.55)}textarea{min-height:120px}
@media (max-width:820px){.grid2,.grid3,.grid4,.detail-grid{grid-template-columns:1fr}.actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.actions button{width:100%;min-height:42px}.title{font-size:18px}.container{padding:10px}.panel{padding:12px}.topline{align-items:flex-start}.table-wrap table{min-width:680px}}
</style></head><body>

<div class="app">
<header class="topbar">
  <div class="topline">
    <div>
      <div class="title">神州掉落物品查詢</div>
      <div class="hint" id="dataStatusTop">尚未載入資料</div>
    </div>
    <div>
      <span class="badge"><span id="versionLabel">免驗證版</span> <span class="license" id="licenseStatus">免驗證</span></span>
      
      <div class="creator" style="margin-top:6px;text-align:right">製作By文昌 尼扣扣</div>
    </div>
  </div>
</header>
<main class="container">
<section class="tab active" id="tab-data">
  <div class="panel"><h2>資料載入</h2>
    <div class="hint">請選擇昨天工具使用的資料檔：MONSTER_C.INI、ITEM.INI、MAGIC.INI、一般怪物位置.csv。選完後按「載入資料」，資料會存到這個瀏覽器，下次開啟會自動載入。</div>
    <div class="field" style="margin-top:10px"><label>選擇資料檔，可一次選多個</label><input id="dataFiles" type="file" multiple></div>
    <div class="actions"><button class="primary" onclick="loadSelectedFiles()">載入資料</button><button class="secondary" onclick="loadDB()">重新讀取已存資料</button><button class="danger" onclick="clearDB()">清除已存資料</button></div>
    <div class="panel" style="margin-top:12px"><h2>目前資料狀態</h2><div id="dataStatus" class="row-title">尚未載入資料</div></div>
  </div>
</section>
<section class="tab" id="tab-monster">
  <div class="panel"><h2>怪物查詢</h2><div class="grid grid4"><div class="field"><label>搜尋怪物 / ID</label><input id="monsterSearch" placeholder="例如 大黑天 或 123"></div><div class="field"><label>最低 Lv</label><input id="lvMin" type="number"></div><div class="field"><label>最高 Lv</label><input id="lvMax" type="number"></div><div class="field"><label>操作</label><button class="secondary" onclick="monsterSearch.value='';lvMin.value='';lvMax.value='';refreshMonsterList()">重置</button></div></div></div>
  <div class="panel"><h2>怪物列表</h2><div class="list" id="monsterList"></div></div>
  <div class="panel" id="monsterDetail"><h2>怪物資料</h2><div class="hint">請先選擇怪物。</div></div>
  <div class="panel"><h2>掉落物品</h2><div class="table-wrap" id="monsterDrops"></div></div>
</section>
<section class="tab" id="tab-item">
  <div class="panel"><h2>道具查詢</h2><div class="field"><label>搜尋道具 / ID</label><input id="itemSearch" placeholder="例如 帝國法器錦囊 或 123"></div></div>
  <div class="panel"><h2>道具列表</h2><div class="list" id="itemList"></div></div>
  <div class="panel" id="itemDetail"><h2>道具資料</h2><div class="hint">請先選擇道具。</div></div>
</section>
<section class="tab" id="tab-reverse">
  <div class="panel"><h2>道具查掉落位置</h2><div class="field"><label>道具名稱 / ID</label><input id="reverseSearch" list="itemSuggestList" placeholder="輸入道具名稱，可模糊搜尋"><datalist id="itemSuggestList"></datalist></div><div class="actions"><button class="primary" onclick="reverseDrop()">查詢掉落</button><button class="secondary" onclick="reverseSearch.value='';reverseResult.innerHTML='';reverseTitle.textContent='查詢結果'">清空</button></div></div>
  <div class="panel"><h2 id="reverseTitle">查詢結果</h2><div class="list" id="reverseResult"></div></div>
</section>
</main></div>
<div class="bottom-nav"><div class="nav-wrap"><button class="nav-btn active" data-tab="data">資料</button><button class="nav-btn" data-tab="monster">怪物</button><button class="nav-btn" data-tab="item">道具</button><button class="nav-btn" data-tab="reverse">掉落反查</button></div></div>


<script>
function hideLicenseModal(){} function initLicense(){$('licenseStatus').textContent='免驗證'}


const TYPE_MAP={"0x00000001":"正道系","0x00000002":"惡人系","0x00000004":"魔族系","0x00000008":"死靈系","0x00000010":"精怪系","0x00000020":"妖物系","0x00000040":"蠱毒系","0x00000080":"猛獸系","0x00000100":"凶禽系","0x00000200":"魔偶系","0x00000400":"神獸系","0x00000800":"仙禽系","0x00001000":"靈獸系","0x00002000":"特殊類","0x00004000":"海獸系"};
const FIELD_MAP={"Level":"等級","Con":"體魄","Str":"力量","Int":"智慧","Dex":"靈敏","ExtraDef":"物理防禦","MagicAttack":"術法攻擊","MagicDef":"術法防禦","DropExp":"經驗"};
let monsters=[],items=[],magics=[],monsterLocations={},itemIndex={},magicIndex={},selectedMonster=null,selectedItem=null;
function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function name(d){return d?.Name||'UNKNOWN'} function iint(v){const n=parseInt(v,10); return Number.isFinite(n)?n:0}
function convertType(v){return TYPE_MAP[v]||v||''}
function parseBlocks(text){const data=[]; let cur=null; for(let line of text.split(/\r?\n/)){line=line.trim(); if(!line||line.startsWith('//')) continue; if(line.startsWith('[')&&line.endsWith(']')){if(cur) data.push(cur); cur={}; continue} const p=line.indexOf('='); if(p>=0){if(!cur) cur={}; cur[line.slice(0,p).trim()]=line.slice(p+1).trim()}} if(cur) data.push(cur); return data}
function parseCSV(text){const rows=[]; let row=[],val='',q=false; for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1]; if(q){if(c=='"'&&n=='"'){val+='"';i++}else if(c=='"')q=false;else val+=c}else{if(c=='"')q=true;else if(c==','){row.push(val);val=''}else if(c=='\n'){row.push(val);rows.push(row);row=[];val=''}else if(c!='\r')val+=c}} if(val||row.length){row.push(val);rows.push(row)} return rows}
function parseLocations(text){const out={}; for(const row of parseCSV(text)){const clean=row.map(x=>String(x).trim()).filter(Boolean); if(clean.length>=2) out[clean[0]]=clean.slice(1).join('、').replace(/^、|、$/g,'')} return out}
async function readFileText(file){const buf=await file.arrayBuffer(); for(const enc of ['utf-8','big5']){try{return new TextDecoder(enc,{fatal:enc==='utf-8'}).decode(buf)}catch(e){}} return new TextDecoder('utf-8').decode(buf)}
function rebuildIndex(){itemIndex={}; magicIndex={}; for(const it of items)itemIndex[String(it.ID||'').trim()]=it; for(const m of magics)magicIndex[String(m.ID||'').trim()]=m; updateStatus(); refreshMonsterList(); refreshItemList(); buildItemDatalist(); updateReverseSuggest()}
function getMonsterLocation(n){return monsterLocations[String(n||'').trim()]||''}
function convertSkillList(v){if(!v)return ''; return String(v).trim().split(/[.,; ]+/).filter(Boolean).map(sid=>magicIndex[sid]?.Name||`SkillID:${sid}`).join('、')}
function parseDrop(drop){if(!drop)return []; const a=String(drop).split(','); if(a.length<4)return []; const d=a.slice(2); let res=[],total=0; for(let i=0;i<d.length;i+=2){if(i+1>=d.length)break; const iid=String(d[i]).trim(), w=iint(d[i+1]); res.push([iid,w]); total+=w} if(total===0)return []; return res.map(([iid,w])=>[iid,w/total*100])}
function updateStatus(){const s=`怪物 ${monsters.length.toLocaleString()}｜道具 ${items.length.toLocaleString()}｜技能 ${magics.length.toLocaleString()}｜位置 ${Object.keys(monsterLocations).length.toLocaleString()}`; $('dataStatus').textContent=s; $('dataStatusTop').textContent=s}
function hasData(){return monsters.length&&items.length}
function needDataHTML(){return '<div class="panel"><h2>尚未載入資料</h2><div class="hint">請先到「資料」分頁載入 MONSTER_C.INI、ITEM.INI、MAGIC.INI、一般怪物位置.csv。</div></div>'}
async function loadSelectedFiles(){const files=[...$('dataFiles').files]; if(!files.length){alert('請先選擇資料檔');return} let got={}; for(const f of files){const lower=f.name.toLowerCase(); const text=await readFileText(f); if(lower.includes('monster_c'))got.monsters=parseBlocks(text); else if(lower.includes('item'))got.items=parseBlocks(text); else if(lower.includes('magic'))got.magics=parseBlocks(text); else if(f.name.includes('一般怪物位置')||lower.includes('location'))got.locations=parseLocations(text)} if(got.monsters)monsters=got.monsters; if(got.items)items=got.items; if(got.magics)magics=got.magics; if(got.locations)monsterLocations=got.locations; await saveDB(); rebuildIndex(); alert('資料載入完成！')}
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('gm_tool_web_db_v1',1); r.onupgradeneeded=()=>r.result.createObjectStore('kv'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error)})}
async function saveDB(){const db=await openDB(); return new Promise((res,rej)=>{const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').put({monsters,items,magics,monsterLocations},'data'); tx.oncomplete=res; tx.onerror=()=>rej(tx.error)})}
async function loadDB(){try{const db=await openDB(); const data=await new Promise((res,rej)=>{const tx=db.transaction('kv','readonly'); const r=tx.objectStore('kv').get('data'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error)}); if(data){monsters=data.monsters||[]; items=data.items||[]; magics=data.magics||[]; monsterLocations=data.monsterLocations||{}; rebuildIndex();}}catch(e){}}
async function clearDB(){if(!confirm('確定清除瀏覽器內已儲存的資料？'))return; const db=await openDB(); await new Promise((res,rej)=>{const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').delete('data'); tx.oncomplete=res; tx.onerror=()=>rej(tx.error)}); monsters=[];items=[];magics=[];monsterLocations={};rebuildIndex(); alert('已清除')}
function refreshMonsterList(){if(!hasData()){$('monsterList').innerHTML=needDataHTML();return} const k=$('monsterSearch').value.trim().toLowerCase(); const lvMin=$('lvMin').value.trim()?iint($('lvMin').value):null; const lvMax=$('lvMax').value.trim()?iint($('lvMax').value):null; let arr=[]; for(const m of monsters){const nm=String(m.Name||''); if(k && !String(m.ID||'').includes(k) && !nm.toLowerCase().includes(k))continue; const lv=iint(m.Level); if(lvMin!==null&&lv<lvMin)continue; if(lvMax!==null&&lv>lvMax)continue; arr.push(m)} if(k||lvMin!==null||lvMax!==null)arr.sort((a,b)=>iint(b.DropExp)-iint(a.DropExp)); arr=arr.slice(0,300); $('monsterList').innerHTML=arr.map(m=>`<div class="row-card" onclick="showMonster('${esc(String(m.ID||''))}')"><div class="row-title">${esc(m.ID)} - ${esc(name(m))}</div><div class="row-sub">Lv.${esc(m.Level||'')}｜EXP ${esc(m.DropExp||0)}｜${esc(getMonsterLocation(name(m)))}</div></div>`).join('')||'<div class="hint">找不到怪物。</div>'}
function showMonster(mid){const m=monsters.find(x=>String(x.ID)==String(mid)); if(!m)return; selectedMonster=m; const order=['ID','Pic','Name','Type','SubType','Level','HP','MP','Con','Str','Int','Dex','ExtraDef','MagicAttack','MagicDef','DropExp','Skill1','Skill2','Skill3','Skill4']; const rows=[]; for(const k of order){let v=m[k]; if(!v)continue; let label=FIELD_MAP[k]||k; if(k==='Type'||k==='SubType')v=convertType(v); if(k.startsWith('Skill'))v=convertSkillList(v); rows.push([label,v])} const loc=getMonsterLocation(name(m)); if(loc)rows.push(['位置',loc]); $('monsterDetail').innerHTML=`<h2>${esc(name(m))}</h2><div class="detail-grid">${rows.map(([k,v])=>`<div class="kv"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('')}</div>`; const drops=parseDrop(m.DropItem).map(([iid,rate])=>[iid,itemIndex[iid]?.Name||'???',rate.toFixed(6)+'%']); renderTable('monsterDrops',['ID','道具','機率'],drops); switchTab('monster')}
function renderTable(id,cols,rows){$(id).innerHTML=`<table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function refreshItemList(){if(!hasData()){$('itemList').innerHTML=needDataHTML();return} const k=$('itemSearch').value.trim().toLowerCase(); let arr=[]; for(const it of items){const nm=String(it.Name||''); if(k && !String(it.ID||'').includes(k) && !nm.toLowerCase().includes(k))continue; arr.push(it)} arr=arr.slice(0,300); $('itemList').innerHTML=arr.map(it=>`<div class="row-card" onclick="showItem('${esc(String(it.ID||''))}')"><div class="row-title">${esc(it.ID)} - ${esc(name(it))}</div><div class="row-sub">${esc(it.Help||'')}</div></div>`).join('')||'<div class="hint">找不到道具。</div>'}
function showItem(iid){const it=itemIndex[String(iid)]; if(!it)return; selectedItem=it; const order=['ID','Icon','GIcon','Name','Level','CLevel','HP','MP','Con','Str','Int','Dex','ExtraDef','Damage','MagicAttack','MagicDef','IceDef','FireDef','LightningDef','DarkDef','ParalysisRes','PosionRes','BlindRes','SilentRes','Value','Help']; const rename={'Name':'道具名稱','Level':'等級','CLevel':'職等','Con':'體魄','Str':'力量','Int':'智慧','Dex':'靈敏','ExtraDef':'物理防禦','MagicAttack':'術法攻擊','MagicDef':'術法防禦','IceDef':'冰防','FireDef':'火防','LightningDef':'電防','DarkDef':'冥防','ParalysisRes':'抗定身','PosionRes':'抗毒','BlindRes':'抗盲目','SilentRes':'抗禁咒','Value':'價值','Help':'說明'}; const rows=[]; for(const k of order){if(k==='Damage'){if(it.DamageMin||it.DamageMax)rows.push(['傷害',`${it.DamageMin||''}~${it.DamageMax||''}`]); continue} if(k in it)rows.push([rename[k]||k,it[k]])} $('itemDetail').innerHTML=`<h2>${esc(name(it))}</h2><div class="detail-grid">${rows.map(([k,v])=>`<div class="kv"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('')}</div>`}
function buildItemDatalist(){const dl=$('itemSuggestList'); dl.innerHTML=items.slice(0,5000).map(it=>`<option value="${esc(name(it))}"></option>`).join('')}
function updateReverseSuggest(){const key=$('reverseSearch').value.trim().toLowerCase(); const dl=$('itemSuggestList'); if(!key){buildItemDatalist(); return} dl.innerHTML=items.filter(it=>String(it.Name||'').toLowerCase().includes(key)||String(it.ID||'').includes(key)).slice(0,80).map(it=>`<option value="${esc(name(it))}"></option>`).join('')}
function reverseDrop(){if(!hasData()){$('reverseResult').innerHTML=needDataHTML();return} const key=$('reverseSearch').value.trim().toLowerCase(); if(!key)return; let target=null; if(/^\d+$/.test(key))target=itemIndex[key]; else target=items.find(it=>String(it.Name||'').toLowerCase().includes(key)); if(!target){$('reverseResult').innerHTML='<div class="hint">找不到道具。</div>';return} const iid=String(target.ID); const res=[]; for(const m of monsters){for(const [did,rate] of parseDrop(m.DropItem)){if(String(did).trim()===iid)res.push([m.ID,name(m),rate,getMonsterLocation(name(m))])}} res.sort((a,b)=>b[2]-a[2]); $('reverseTitle').textContent=`${target.ID} - ${name(target)}｜共 ${res.length} 筆掉落`; $('reverseResult').innerHTML=res.map(r=>`<div class="row-card" onclick="showMonster('${esc(String(r[0]))}')"><div class="row-title">${esc(r[1])} <span class="pill">${esc(r[2].toFixed(6))}%</span></div><div class="row-sub">ID ${esc(r[0])}｜${esc(r[3]||'')}</div></div>`).join('')||'<div class="hint">沒有怪物掉落這個道具。</div>'}
function switchTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); $('tab-'+tab).classList.add('active'); document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active'); window.scrollTo({top:0,behavior:'smooth'})}
document.addEventListener('click',e=>{const b=e.target.closest('.nav-btn'); if(b)switchTab(b.dataset.tab)})
function bindEvents(){['monsterSearch','lvMin','lvMax'].forEach(id=>$(id).addEventListener('input',refreshMonsterList)); $('itemSearch').addEventListener('input',refreshItemList); $('reverseSearch').addEventListener('input',updateReverseSuggest)}

window.addEventListener('DOMContentLoaded',()=>{bindEvents(); loadDB(); initLicense();});
</script></body></html>
